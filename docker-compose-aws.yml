version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile_AWS
    container_name: cdo_app
    ports:
      - "8501:8501"
      - "8000:8000" # Exponemos API también para el agente local
    environment:
      - PORT=8501
      - API_URL=http://localhost:8000
      - DB_PATH=/data/users.db
      - TZ=America/Bogota
      # Supabase connection (optional if using SQLite)
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_USER=${SUPABASE_USER}
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD}
      - SUPABASE_DB=${SUPABASE_DB}
      - SUPABASE_PORT=${SUPABASE_PORT}
    volumes:
      - ./data:/data
    restart: always

  # Backend API integrado en 'app' (ya no es un servicio separado)
  # Se ejecuta mediante start_aws.sh en el contenedor principal

