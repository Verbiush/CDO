version: '3.8'

services:
  frontend:
    build: .
    container_name: cdo_frontend
    restart: always
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      # En docker interno, el backend es accesible por nombre de servicio 'backend'
      # Pero el navegador del cliente NO ve 'backend', ve la IP del host.
      # Para comunicaciones server-side (backend -> frontend), usamos nombre de servicio.
      # Para el cliente JS, necesitará la IP pública.
      - API_URL=http://backend:8000
    command: streamlit run src/app_web.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - backend

  backend:
    build: .
    container_name: cdo_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn src.server_api:app --host 0.0.0.0 --port 8000

  fevrips-api:
    image: fevripsacr.azurecr.io/minsalud.fevrips.apilocal:latest
    container_name: fevrips-api
    ports:
      - "5000:5000"
      - "9443:5100"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - "ASPNETCORE_URLS=http://+:5000;https://+:5100"
      - "ConnectionStrings__DefaultConnection=Server=mssql-apilocal;Database=apilocal;User Id=sa;Password=TuContrasenaSegura123!;TrustServerCertificate=True"
      - RedisConnection=redis-apilocal:6379
    depends_on:
      - mssql-apilocal
      - redis-apilocal
    restart: always

  mssql-apilocal:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: mssql-apilocal
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=TuContrasenaSegura123!
      - MSSQL_SA_PASSWORD=TuContrasenaSegura123!
    ports:
      - "1433:1433"
    restart: always

  redis-apilocal:
    image: redis:latest
    container_name: redis-apilocal
    ports:
      - "6379:6379"
    restart: always